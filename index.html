<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

video{
    width:90%;
    max-width:800px;
}

/* popup */
#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:280px;
}

.popup-box h3{
    margin-bottom:15px;
    font-size:18px;
}

.popup-box button{
    padding:10px 20px;
    border:none;
    background:#000;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video controls>
    <source src="https://cdn.videy.co/SrbiALog1.mp4" type="video/mp4">
</video>

<!-- POPUP -->
<div id="popup">
    <div class="popup-box">
        <h3>Konten ini berisi 18+</h3>
        <button onclick="goAds()">OK untuk lanjut</button>
    </div>
</div>

<script>
const popup = document.getElementById("popup");
const adsLink = "https://cdn.aceimg.com/2EdYAoWV1.png";

// cek apakah sudah pernah tampil
const alreadyShown = localStorage.getItem("popupShown");

if(!alreadyShown){
    setTimeout(() => {
        popup.style.display = "flex";
    }, 3000);
}

function goAds(){
    // tandai sudah pernah muncul
    localStorage.setItem("popupShown", "true");

    // redirect ke iklan
    window.location.href = adsLink;
}
</script>

</body>
</html>
